components:
  schemas:
    Success_Envelope:
      type: object
      description: >-
        Standard success envelope produced by createSuccessResponse. Successful
        responses always carry success=true, a data payload, and a meta object.
        Paginated collections place their pagination metadata in meta.pagination.
      required:
        - success
        - data
        - meta
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          description: The response payload. Shape varies per endpoint.
          nullable: true
        meta:
          $ref: '#/components/schemas/Meta'
    Error_Envelope:
      type: object
      description: >-
        Standard error envelope produced by createErrorResponse. Error responses
        (HTTP status >= 400) always carry success=false, data=null, and an error
        object with a non-empty code and message.
      required:
        - success
        - data
        - error
      properties:
        success:
          type: boolean
          enum: [false]
        data:
          type: object
          nullable: true
          enum: [null]
        error:
          $ref: '#/components/schemas/Error_Detail'
        meta:
          $ref: '#/components/schemas/Meta'
    Error_Detail:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: Machine-readable error code (non-empty).
        message:
          type: string
          description: Human-readable error message (non-empty).
        details:
          description: Optional additional error context (e.g. validation issues).
          nullable: true
    Meta:
      type: object
      description: Response metadata. Includes pagination for paginated collections.
      properties:
        pagination:
          $ref: '#/components/schemas/Pagination'
    Pagination:
      type: object
      properties:
        page:
          type: integer
        pageSize:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
    User:
      type: object
      description: User account as returned by UserService.
      required:
        - username
        - name
        - email
        - role
      properties:
        id:
          oneOf:
            - type: string
            - type: integer
        username:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        department:
          type: string
          nullable: true
        job_title:
          type: string
          nullable: true
        role:
          type: string
        profile_picture:
          type: string
          nullable: true
        status:
          type: string
        last_login:
          type: string
          nullable: true
        permissions:
          type: array
          items:
            type: object
            properties:
              module:
                type: string
              action:
                type: string
    RegisterInput:
      type: object
      description: >-
        Admin-supplied payload to create a user account (RegisterSchema from
        @alsaqi/shared).
      required:
        - username
        - password
        - name
        - email
        - role
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
        password:
          type: string
          minLength: 6
          maxLength: 100
        name:
          type: string
          maxLength: 100
        email:
          type: string
          format: email
          maxLength: 255
        role:
          type: string
          maxLength: 50
        department:
          type: string
          nullable: true
        job_title_id:
          type: string
          nullable: true
        unit:
          type: string
          nullable: true
        reporting_manager_id:
          type: string
          nullable: true
        access_scope:
          type: string
          nullable: true
        phone_number:
          type: string
          nullable: true
        notes:
          type: string
          nullable: true
        status:
          type: string
          enum: [Active, Inactive, Suspended]
    Notification:
      type: object
      description: A notification feed item for the current user.
      required:
        - event_type
        - description
        - related_module
        - date
      properties:
        id:
          oneOf:
            - type: string
            - type: integer
        recipient_row_id:
          type: string
        user_id:
          type: integer
        event_type:
          type: string
        title:
          type: string
          nullable: true
        description:
          type: string
        related_module:
          type: string
        date:
          type: string
        status:
          type: string
          enum: [Read, Unread]
        is_read:
          type: boolean
        read_at:
          type: string
          nullable: true
        link:
          type: string
        actor_id:
          type: string
        entity_id:
          type: string
        entity_type:
          type: string
        data:
          type: object
          additionalProperties: true
