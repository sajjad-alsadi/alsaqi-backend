  '/auth/2fa':
    delete:
      summary: DELETE /auth/2fa
      description: Disable 2FA for the authenticated user after password confirmation.
      operationId: delete_auth_2fa
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [password]
              properties:
                password:
                  type: string
      responses:
        '200':
          description: "2FA disabled. Success_Envelope with data { success: true }."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success_Envelope'
        '401':
          description: Unauthenticated or incorrect password.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/2fa/backup':
    post:
      summary: POST /auth/2fa/backup
      description: >-
        Login-flow step. Accepts a backup code as an alternative to a TOTP code
        using the short-lived temp token, and issues full session tokens.
      operationId: post_auth_2fa_backup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tempToken, code]
              properties:
                tempToken:
                  type: string
                code:
                  type: string
      responses:
        '200':
          description: Backup code accepted. Success_Envelope with data { user, token }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success_Envelope'
        '401':
          description: Invalid backup code or temp token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/2fa/setup':
    post:
      summary: POST /auth/2fa/setup
      description: >-
        Requires authentication. Generates a TOTP secret, QR code, and backup
        codes for the current user.
      operationId: post_auth_2fa_setup
      responses:
        '200':
          description: Setup material. Success_Envelope with data { secret, qrCodeDataUrl, backupCodes }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success_Envelope'
        '401':
          description: Unauthenticated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/2fa/setup-complete':
    post:
      summary: POST /auth/2fa/setup-complete
      description: >-
        Forced-enrollment step. Uses the 2fa_setup_pending temp token, verifies
        the first TOTP code, enables 2FA, clears the forced-enrollment flag, and
        issues full session tokens.
      operationId: post_auth_2fa_setup_complete
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tempToken, token]
              properties:
                tempToken:
                  type: string
                token:
                  type: string
                  description: 6-digit TOTP code.
      responses:
        '200':
          description: Enrollment completed. Success_Envelope with data { user, token }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success_Envelope'
        '401':
          description: Invalid TOTP code or temp token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/2fa/setup-pending':
    post:
      summary: POST /auth/2fa/setup-pending
      description: >-
        Forced-enrollment step. Uses the 2fa_setup_pending temp token to generate
        the TOTP secret, QR code, and backup codes before a session is granted.
      operationId: post_auth_2fa_setup_pending
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tempToken]
              properties:
                tempToken:
                  type: string
      responses:
        '200':
          description: Setup material. Success_Envelope with data { secret, qrCodeDataUrl, backupCodes }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success_Envelope'
        '401':
          description: Invalid or expired temp token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
        '409':
          description: 2FA setup already in progress.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/2fa/validate':
    post:
      summary: POST /auth/2fa/validate
      description: >-
        Login-flow step. Validates a TOTP code using the short-lived temp token
        and issues full session tokens.
      operationId: post_auth_2fa_validate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tempToken, token]
              properties:
                tempToken:
                  type: string
                token:
                  type: string
                  description: 6-digit TOTP code.
      responses:
        '200':
          description: TOTP accepted. Success_Envelope with data { user, token }.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success_Envelope'
        '401':
          description: Invalid TOTP code or temp token.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/2fa/verify':
    post:
      summary: POST /auth/2fa/verify
      description: >-
        Requires authentication. Confirms 2FA setup by verifying the first TOTP
        code, enabling 2FA on success.
      operationId: post_auth_2fa_verify
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token:
                  type: string
                  description: 6-digit TOTP code.
      responses:
        '200':
          description: "2FA enabled. Success_Envelope with data { success: true }."
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Success_Envelope'
        '400':
          description: Invalid TOTP code.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
        '401':
          description: Unauthenticated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/approve-reset':
    post:
