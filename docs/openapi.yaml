    routes registered under the unified API base in src/routes/v1/index.ts.
    Paths are expressed on the unversioned /api base per the unified frontend
    contract; the versioned /api/v1 form resolves to the same handlers. The
    Docs_Endpoint (GET /docs) is intentionally excluded from this contract.
servers:
  - url: /api
    description: Unversioned API base path (unified contract)
  - url: /api/v1
    description: Versioned API base path (backward compatible)
