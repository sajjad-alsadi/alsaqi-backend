      operationId: put_notifications_mark_all_read
      responses:
        '200':
          description: Success_Envelope whose data.updated is the number of notifications marked read.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success_Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          updated:
                            type: integer
        '401':
          description: Unauthenticated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/notifications/mark-read':
    put:
      summary: PUT /notifications/mark-read
      description: >-
        Bulk-marks the listed notifications of the authenticated user as read.
        Returns the count of notifications actually changed to read.
      operationId: put_notifications_mark_read
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [notification_ids]
              properties:
                notification_ids:
                  type: array
                  items:
                    oneOf:
                      - type: string
                      - type: integer
      responses:
        '200':
          description: Success_Envelope whose data.updated is the number of notifications marked read.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success_Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          updated:
                            type: integer
        '400':
          description: notification_ids missing or not an array.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
        '401':
          description: Unauthenticated request.
          content:
            application/json:
