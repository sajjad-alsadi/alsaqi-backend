          description: Successful response
  '/auth/register':
    post:
      summary: POST /auth/register
      description: >-
        Admin-guarded user creation. Requires an authenticated session AND the
        UserManagement/Create permission. This is NOT public self-registration;
        it reuses the same UserService creation path as POST /users. The path is
        CSRF-protected (not exempted).
      operationId: post_auth_register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterInput'
      responses:
        '201':
          description: User created. Success_Envelope whose data contains the created user.
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/Success_Envelope'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
        '400':
          description: RegisterInput validation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
        '401':
          description: Unauthenticated request.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
        '403':
          description: Authenticated but missing UserManagement/Create permission.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
        '409':
          description: Duplicate username or email; error identifies the duplicate field.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error_Envelope'
  '/auth/reject-reset':
