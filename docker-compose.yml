# docker-compose.yml - Production orchestration
# Application exposes port 3000; PostgreSQL and Redis are internal-only (no host ports)
# Services communicate via the alsaqi-network bridge network, environment variables via .env file

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - DATABASE_URL=postgresql://${POSTGRES_USER:-alsaqi}:${POSTGRES_PASSWORD:-alsaqi}@postgres:5432/${POSTGRES_DB:-alsaqi}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-changeme}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - alsaqi-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M

  postgres:
    image: postgres:15
    container_name: alsaqi-postgres
    env_file:
      - .env
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-alsaqi}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-alsaqi}
      - POSTGRES_DB=${POSTGRES_DB:-alsaqi}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - alsaqi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-alsaqi} -d ${POSTGRES_DB:-alsaqi}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: alsaqi-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    networks:
      - alsaqi-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-changeme}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  alsaqi-network:
    driver: bridge

volumes:
  postgres_data:
    name: alsaqi_postgres_data
