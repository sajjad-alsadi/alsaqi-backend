# =============================================================================
# Reverse_Proxy (Nginx) configuration for alsaqi-backend
# Feature: production-launch-readiness — Task 8.1 (Design section ح)
#
# Responsibilities (Requirement 4):
#   4.1  Redirect HTTP -> HTTPS with a 308 while preserving path + query string.
#   4.2  Terminate TLS and proxy requests to API_Container over the internal network.
#   4.3  Emit Strict-Transport-Security with max-age >= 31536000 (>= 1 year).
#   4.4  Forward the client's original protocol and host to API_Container.
#
# The API_Container is reachable only on the internal Docker network as the
# upstream "api" on port 3000 (see docker-compose.yml service name "api").
# =============================================================================

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    # ---- Base hardening / hygiene -------------------------------------------
    # Do not advertise the nginx version in error pages or the Server header.
    server_tokens off;

    # Reasonable timeouts and proxy buffering defaults.
    sendfile        on;
    keepalive_timeout 65;
    client_max_body_size 25m;          # allow uploads; tune to UPLOAD_DIR needs

    # Upstream API_Container. The service name "api" resolves on the internal
    # Docker network defined in docker-compose.yml; the application listens on
    # port 3000 and is NOT published to any public/external network (Req 4.5).
    upstream api_backend {
        server api:3000;
        keepalive 32;
    }

    # -------------------------------------------------------------------------
    # HTTP :80 — permanent redirect to HTTPS (Req 4.1)
    #
    # 308 (Permanent Redirect) preserves the request METHOD and BODY, unlike 301.
    # Using $request_uri preserves the original path AND query string unmodified.
    # -------------------------------------------------------------------------
    server {
        listen 80;
        listen [::]:80;
        server_name _;

        # $host = client-supplied Host header; $request_uri = original path+query.
        return 308 https://$host$request_uri;
    }

    # -------------------------------------------------------------------------
    # HTTPS :443 — TLS termination + reverse proxy to API_Container (Req 4.2)
    # -------------------------------------------------------------------------
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;

        # Set this to the public hostname of the deployment (the Public_Endpoint).
        server_name api.example.local;

        # ---- TLS certificate material ---------------------------------------
        # Configure these paths to your deployment's certificate and private key.
        # Mount them into the reverse-proxy container (e.g. via a Docker volume)
        # or replace with paths issued by your CA / certbot.
        #   ssl_certificate      -> full chain (server cert + intermediates)
        #   ssl_certificate_key  -> private key (keep restricted, never commit)
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ---- TLS protocol settings ------------------------------------------
        # Restrict to modern, secure protocols only.
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_session_tickets off;

        # ---- HSTS (Req 4.3) -------------------------------------------------
        # max-age = 31536000 seconds = 1 year (the required minimum).
        # "always" ensures the header is sent on error responses too.
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ---- Proxy to API_Container (Req 4.2, 4.4) --------------------------
        location / {
            proxy_pass http://api_backend;

            proxy_http_version 1.1;

            # Forward the client's original protocol and host (Req 4.4, 4.6).
            # X-Forwarded-Proto lets the app build absolute https:// URLs and
            # apply Secure-cookie logic; X-Forwarded-Host / Host preserve the
            # originally requested hostname.
            proxy_set_header Host              $host;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;

            # Standard client-address forwarding headers.
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;

            # Connection upgrade support (WebSocket / keep-alive upstream).
            proxy_set_header Connection        "";
            proxy_set_header Upgrade           $http_upgrade;

            # Pass through reasonable upstream timeouts.
            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;
        }
    }
}
